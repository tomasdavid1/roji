<?xml version="1.0" encoding="UTF-8"?>
<!--
  Roji R monogram - glow variant.

  Same R as r-mark.svg but rendered against a soft radial halo
  emanating from below, so the bottom of the letter appears to
  dissolve into a blue glow. Works on dark backgrounds.

  Use this variant for:
    - the SiteHeader lockup
    - the large hero on tools.rojipeptides.com
    - the rasterized OG card

  Do NOT use this in the favicon - at 16/32px the glow turns into
  illegible mush. Use the sharp r-mark.svg there.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" fill="none">
  <title>Roji</title>

  <defs>
    <radialGradient id="bottom-halo" cx="50%" cy="92%" r="58%" fx="50%" fy="100%">
      <stop offset="0%"  stop-color="#4f6df5" stop-opacity="0.55" />
      <stop offset="35%" stop-color="#4f6df5" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#4f6df5" stop-opacity="0" />
    </radialGradient>

    <filter id="soften-bottom" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.7" />
    </filter>
  </defs>

  <ellipse cx="128" cy="232" rx="118" ry="70" fill="url(#bottom-halo)" />

  <path
    d="
      M 56 48
      L 56 208
      L 88 208
      L 88 152
      L 124 152
      L 168 208
      L 208 208
      L 208 200
      L 158 142
      C 184 132 196 116 196 92
      C 196 64 174 48 142 48
      Z
      M 88 80
      L 138 80
      C 154 80 164 86 164 100
      C 164 116 152 124 138 124
      L 88 124
      Z
    "
    fill="#4f6df5"
    fill-rule="evenodd"
    filter="url(#soften-bottom)"
  />
</svg>
