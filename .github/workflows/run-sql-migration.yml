name: Run SQL migration on Kinsta

# Apply a versioned SQL migration to the production WordPress DB.
# Manual dispatch only — destructive content edits should never run on
# autopilot. Always takes a backup before applying.
#
# Usage:
#   gh workflow run run-sql-migration.yml \
#     -f migration_file=roji-store/scripts/sql/2026-04-28-bluum-compliance-rewrite.sql
#
# Or trigger from the GitHub UI: Actions → Run SQL migration on Kinsta → Run workflow

on:
  workflow_dispatch:
    inputs:
      migration_file:
        description: 'Path to .sql file relative to repo root (e.g. roji-store/scripts/sql/2026-04-28-foo.sql)'
        required: true
      keep_backup:
        description: 'Keep the pre-migration backup on the server (true/false)'
        required: false
        default: 'true'

concurrency:
  group: kinsta-db
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate migration file exists
        env:
          FILE: ${{ github.event.inputs.migration_file }}
        run: |
          set -euo pipefail
          if [ ! -f "$FILE" ]; then
            echo "::error::Migration file not found: $FILE"
            exit 1
          fi
          if [[ "$FILE" != *.sql ]]; then
            echo "::error::Not a .sql file: $FILE"
            exit 1
          fi
          echo "Will apply: $FILE ($(wc -c < "$FILE") bytes)"
          echo "--- Preview (first 40 lines) ---"
          head -40 "$FILE"

      - name: Install sshpass + rsync
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass rsync

      - name: Configure SSH known_hosts
        env:
          HOST: ${{ secrets.KINSTA_SSH_HOST }}
          PORT: ${{ secrets.KINSTA_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: Backup remote DB
        id: backup
        env:
          SSHPASS: ${{ secrets.KINSTA_SSH_PASSWORD }}
          HOST: ${{ secrets.KINSTA_SSH_HOST }}
          PORT: ${{ secrets.KINSTA_SSH_PORT }}
          USER: ${{ secrets.KINSTA_SSH_USER }}
          WP_PATH: ${{ secrets.KINSTA_WP_PATH }}
        run: |
          ts="$(date -u +%Y%m%dT%H%M%SZ)"
          backup="roji-pre-migration-$ts.sql.gz"
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -p "$PORT" "$USER@$HOST" \
            "cd '$WP_PATH' && wp db export $backup"
          echo "backup=$backup" >> "$GITHUB_OUTPUT"
          echo "Backup saved on server: $WP_PATH/$backup"

      - name: Upload migration file
        env:
          SSHPASS: ${{ secrets.KINSTA_SSH_PASSWORD }}
          HOST: ${{ secrets.KINSTA_SSH_HOST }}
          PORT: ${{ secrets.KINSTA_SSH_PORT }}
          USER: ${{ secrets.KINSTA_SSH_USER }}
          WP_PATH: ${{ secrets.KINSTA_WP_PATH }}
          FILE: ${{ github.event.inputs.migration_file }}
        run: |
          ts="$(date -u +%Y%m%dT%H%M%SZ)"
          remote="roji-migration-$ts.sql"
          sshpass -e rsync -avz \
            -e "ssh -o StrictHostKeyChecking=accept-new -p $PORT" \
            "$FILE" \
            "$USER@$HOST:$WP_PATH/$remote"
          echo "REMOTE_NAME=$remote" >> "$GITHUB_ENV"

      - name: Apply migration
        env:
          SSHPASS: ${{ secrets.KINSTA_SSH_PASSWORD }}
          HOST: ${{ secrets.KINSTA_SSH_HOST }}
          PORT: ${{ secrets.KINSTA_SSH_PORT }}
          USER: ${{ secrets.KINSTA_SSH_USER }}
          WP_PATH: ${{ secrets.KINSTA_WP_PATH }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -p "$PORT" "$USER@$HOST" \
            "cd '$WP_PATH' && wp db import $REMOTE_NAME && rm -f $REMOTE_NAME"

      - name: Flush caches
        env:
          SSHPASS: ${{ secrets.KINSTA_SSH_PASSWORD }}
          HOST: ${{ secrets.KINSTA_SSH_HOST }}
          PORT: ${{ secrets.KINSTA_SSH_PORT }}
          USER: ${{ secrets.KINSTA_SSH_USER }}
          WP_PATH: ${{ secrets.KINSTA_WP_PATH }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -p "$PORT" "$USER@$HOST" \
            "cd '$WP_PATH' && wp cache flush --quiet 2>/dev/null || true && wp rewrite flush --quiet"

      - name: Cleanup backup (optional)
        if: github.event.inputs.keep_backup == 'false'
        env:
          SSHPASS: ${{ secrets.KINSTA_SSH_PASSWORD }}
          HOST: ${{ secrets.KINSTA_SSH_HOST }}
          PORT: ${{ secrets.KINSTA_SSH_PORT }}
          USER: ${{ secrets.KINSTA_SSH_USER }}
          WP_PATH: ${{ secrets.KINSTA_WP_PATH }}
          BACKUP: ${{ steps.backup.outputs.backup }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -p "$PORT" "$USER@$HOST" \
            "cd '$WP_PATH' && rm -f '$BACKUP'"
          echo "Removed backup: $BACKUP"

      - name: Summary
        run: |
          echo "### Migration applied" >> "$GITHUB_STEP_SUMMARY"
          echo "- File: \`${{ github.event.inputs.migration_file }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backup: \`${{ steps.backup.outputs.backup }}\` (on server, kept=${{ github.event.inputs.keep_backup }})" >> "$GITHUB_STEP_SUMMARY"
